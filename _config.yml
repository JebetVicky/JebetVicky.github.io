# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Site language and timezone
lang: en
timezone: Africa/Nairobi

# SEO settings
title: Jebet Vicky
tagline: GIS | Remote Sensing | MEL | Data Analysis
description: >-
  Sharing my work at the intersection of geospatial data, climate resilience, MEL, and AI-driven environmental insights.

# Site URL
url: "https://JebetVicky.github.io"

# Social accounts
github:
  username: JebetVicky

X:
  username: JebetVicky1

social:
  name: Vicky Jebet
  email: jebetv15@gmail.com
  links:
    - https://x.com/JebetVicky1
    - https://github.com/JebetVicky
    - https://www.linkedin.com/in/vicky-jebet/

# Web analytics (optional, fill if available)
analytics:
  google:
    id: ""
  goatcounter:
    id: ""
  umami:
    id: ""
    domain: ""
  matomo:
    id: ""
    domain: ""
  cloudflare:
    id: ""
  fathom:
    id: ""

# Page views provider
pageviews:
  provider: goatcounter

# Theme color scheme
theme_mode: light

# CDN for media resources
cdn: ""

# Sidebar avatar (optional)
avatar: ""

# Social preview image for SEO (optional)
social_preview_image: ""

# Table of contents in posts
toc: true

# Comments
comments:
  provider: utterances
  utterances:
    repo: JebetVicky/blog-comments
    issue_term: pathname
    input_position: bottom
    lang: en
    reactions_enabled: true

# Self-hosted assets
assets:
  self_host:
    enabled: false
    env: ""

# Progressive Web App
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

# Pagination
paginate: 10
baseurl: ""

# Kramdown and syntax highlighting
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Sass
sass:
  style: compressed

# HTML compression
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Exclusions
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# Jekyll archives
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
