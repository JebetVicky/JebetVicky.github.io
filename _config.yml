# Theme
theme: jekyll-theme-chirpy

# Site language and timezone
lang: en
timezone: Africa/Nairobi

# SEO settings
title: Vicky Jebet
tagline: GIS | Remote Sensing | MEL | Data Analysis
description: Geospatial analyst and MEL specialist working at the intersection of climate resilience, carbon projects, and data-driven impact.
url: "https://JebetVicky.github.io"
baseurl: ""

# Social accounts
github:
  username: JebetVicky
twitter:
  username: JebetVicky1
social:
  name: Vicky Jebet
  email: jebetv15@gmail.com
links:
  - https://twitter.com/JebetVicky1
  - https://github.com/JebetVicky
  - https://www.linkedin.com/in/vicky-jebet/

# Avatar (optional – add an image to assets/img/avatar.png)
avatar: ""

# Theme mode (light, dark, or empty for system preference)
theme_mode: light

# Table of contents in posts
toc: true

# Pagination
paginate: 10

# Comments (disabled for now)
comments:
  provider: ""

# PWA
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Sass
sass:
  style: compressed

# Excludes
exclude:
  - "*.gem"
  - "*.gemspec"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "package.json"
  - "*.config.js"
